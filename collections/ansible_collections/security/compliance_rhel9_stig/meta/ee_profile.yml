---
# Execution Environment Profile: DISA STIG for RHEL 9
# Used by the AAP EE Builder to construct a compliance-ready EE.
#
# The scap-security-guide RPM includes:
#   - SCAP data streams for OpenSCAP scanning (/usr/share/xml/scap/ssg/content/)
#   - Pre-rendered Ansible remediation playbooks (/usr/share/scap-security-guide/ansible/)
#   - XCCDF/OVAL content for 300+ STIG rules
#
# This RPM is maintained by Red Hat as part of RHEL.
# DISA quarterly updates -> Red Hat RPM update -> rebuild EE -> new content.
#
# Build:
#   cd collections/ansible_collections/security/compliance_rhel9_stig
#   ansible-builder build -f meta/ee_profile.yml -t compliance-stig-rhel9:latest -v3
#
# Or use the build script:
#   ./scripts/build-ee.sh

version: 3

build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: '--pre'

options:
  package_manager_path: /usr/bin/microdnf

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest

dependencies:
  galaxy:
    collections:
      - name: ansible.posix
  python: []
  system: []

additional_build_steps:
  prepend_galaxy:
    - COPY _build/collections/ /usr/share/ansible/collections/
  prepend_final:
    - RUN printf '[centos9-appstream]\nname=CentOS 9 AppStream\nbaseurl=https://mirror.stream.centos.org/9-stream/AppStream/$basearch/os/\ngpgcheck=0\nenabled=1\n' > /etc/yum.repos.d/centos9.repo && microdnf install -y scap-security-guide openscap-scanner && microdnf clean all && rm /etc/yum.repos.d/centos9.repo
  append_final:
    - RUN rpm -q scap-security-guide openscap-scanner
    - RUN test -f /usr/share/scap-security-guide/ansible/rhel9-playbook-stig.yml
    - RUN test -f /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml
