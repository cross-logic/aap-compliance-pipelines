---
profile:
  id: stig_rhel9_v2r8
  name: DISA STIG for RHEL 9
  version: V2R8
  framework: DISA_STIG
  description: >
    Security Technical Implementation Guide for Red Hat Enterprise Linux 9.
    Rules evaluated centrally against agentlessly gathered facts.

rules:
  - id: sshd_set_idle_timeout
    stig_id: V-257844
    title: Set SSH Client Alive Interval
    severity: high
    category: Access Control
    disruption: low
    check_text: Verify the SSH daemon is configured to terminate idle sessions.
    fix_text: Set ClientAliveInterval to 600 in /etc/ssh/sshd_config.
    check:
      category: ssh_config
      type: ssh_config
      params:
        key: clientaliveinterval
        value: "600"
    parameters:
      - name: var_sshd_set_keepalive
        label: Client Alive Interval (seconds)
        type: number
        default: 600

  - id: sshd_disable_root_login
    stig_id: V-257846
    title: Disable SSH Root Login
    severity: high
    category: Access Control
    disruption: low
    check_text: Verify SSH prohibits direct root login.
    fix_text: Set PermitRootLogin to no in /etc/ssh/sshd_config.
    check:
      category: ssh_config
      type: ssh_config
      params:
        key: permitrootlogin
        value: "no"

  - id: enable_fips_mode
    stig_id: V-257777
    title: Enable FIPS 140-3 Mode
    severity: high
    category: System and Communications Protection
    disruption: high
    check_text: Verify the system is in FIPS mode.
    fix_text: Enable FIPS mode with fips-mode-setup --enable.
    check:
      category: crypto_policy
      type: crypto_policy
      params:
        policy: FIPS

  - id: accounts_tmout
    stig_id: V-257893
    title: Set Account Session Timeout
    severity: medium
    category: Access Control
    disruption: low
    check_text: Verify TMOUT is set for user sessions.
    fix_text: Configure TMOUT in /etc/profile.d/ to 900 seconds.
    check:
      category: files
      type: file_contains
      params:
        path: /etc/profile
        pattern: 'TMOUT=\d+'
    parameters:
      - name: var_accounts_tmout
        label: Timeout (seconds)
        type: number
        default: 900

  - id: package_aide_installed
    stig_id: V-257780
    title: Install AIDE
    severity: medium
    category: System and Information Integrity
    disruption: low
    check_text: Verify AIDE is installed.
    fix_text: Install AIDE with dnf install aide.
    check:
      category: packages
      type: package_installed
      params:
        name: aide

  - id: service_auditd_enabled
    stig_id: V-257783
    title: Enable auditd Service
    severity: medium
    category: Audit and Accountability
    disruption: low
    check_text: Verify auditd is enabled and running.
    fix_text: Enable auditd with systemctl enable --now auditd.
    check:
      category: services
      type: service_enabled
      params:
        name: auditd

  - id: grub2_password
    stig_id: V-257785
    title: Set GRUB2 Boot Loader Password
    severity: high
    category: Configuration Management
    disruption: medium
    check_text: Verify GRUB2 is password-protected.
    fix_text: Set GRUB2 password using grub2-setpassword.
    check:
      category: grub
      type: grub_password

  - id: no_empty_passwords
    stig_id: V-257832
    title: Prevent Empty Passwords
    severity: high
    category: Authentication
    disruption: low
    check_text: Verify no PAM modules allow empty passwords.
    fix_text: Remove nullok from PAM configuration files.
    check:
      category: users
      type: no_empty_passwords

  - id: disable_ctrlaltdel_reboot
    stig_id: V-257790
    title: Disable Ctrl-Alt-Del Reboot
    severity: high
    category: Configuration Management
    disruption: low
    check_text: Verify ctrl-alt-del.target is masked.
    fix_text: Mask ctrl-alt-del.target with systemctl mask ctrl-alt-del.target.
    check:
      category: services
      type: service_disabled
      params:
        name: ctrl-alt-del

  - id: sysctl_accept_redirects
    stig_id: V-257800
    title: Disable ICMP Redirect Acceptance
    severity: medium
    category: Network Configuration
    disruption: low
    check_text: Verify ICMP redirects are disabled.
    fix_text: Set sysctl net.ipv4.conf.all.accept_redirects = 0.
    check:
      category: sysctl
      type: sysctl_value
      params:
        key: net.ipv4.conf.all.accept_redirects
        value: "0"

  - id: mount_tmp_noexec
    stig_id: V-257793
    title: Mount /tmp with noexec
    severity: medium
    category: Configuration Management
    disruption: medium
    check_text: Verify /tmp is mounted with noexec.
    fix_text: Add noexec to /tmp mount options in /etc/fstab.
    check:
      category: mounts
      type: mount_option
      params:
        mountpoint: /tmp
        option: noexec

  - id: banner_etc_issue
    stig_id: V-257795
    title: Configure Login Banner
    severity: medium
    category: Access Control
    disruption: low
    check_text: Verify the login banner contains required text.
    fix_text: Configure the DoD consent banner in /etc/issue.
    check:
      category: files
      type: file_contains
      params:
        path: /etc/issue
        pattern: 'U\.S\. Government|USG|authorized'
    parameters:
      - name: login_banner_text
        label: Banner Text
        type: string
        default: "You are accessing a U.S. Government Information System..."

  - id: selinux_enforcing
    stig_id: V-257786
    title: SELinux Must Be Enforcing
    severity: high
    category: Access Control
    disruption: high
    check_text: Verify SELinux is in enforcing mode.
    fix_text: Set SELinux to enforcing in /etc/selinux/config and reboot.
    check:
      category: selinux
      type: selinux_enforcing

  - id: package_rsyslog_installed
    stig_id: V-257810
    title: Install rsyslog
    severity: medium
    category: Audit and Accountability
    disruption: low
    check_text: Verify rsyslog is installed.
    fix_text: Install rsyslog with dnf install rsyslog.
    check:
      category: packages
      type: package_installed
      params:
        name: rsyslog

  - id: audit_chmod
    stig_id: V-257910
    title: Audit DAC Permission Changes — chmod
    severity: medium
    category: Audit and Accountability
    disruption: low
    check_text: Verify audit rules for chmod, fchmod, fchmodat.
    fix_text: Add audit rules for chmod to /etc/audit/rules.d/.
    check:
      category: audit_rules
      type: audit_rule_exists
      params:
        pattern: 'chmod'

  - id: sshd_disable_empty_passwords
    stig_id: V-257848
    title: Disable SSH Empty Passwords
    severity: high
    category: Access Control
    disruption: low
    check_text: Verify SSH does not permit empty passwords.
    fix_text: Set PermitEmptyPasswords to no in sshd_config.
    check:
      category: ssh_config
      type: ssh_config
      params:
        key: permitemptypasswords
        value: "no"

  - id: configure_crypto_policy
    stig_id: V-257778
    title: Configure System Cryptography Policy
    severity: medium
    category: System and Communications Protection
    disruption: medium
    check_text: Verify system-wide crypto policy is set to FIPS or stricter.
    fix_text: Run update-crypto-policies --set FIPS.
    check:
      category: crypto_policy
      type: crypto_policy
      params:
        policy: FIPS
    parameters:
      - name: var_system_crypto_policy
        label: Crypto Policy
        type: select
        default: FIPS
        options:
          - {label: DEFAULT, value: DEFAULT}
          - {label: FIPS, value: FIPS}
          - {label: "FIPS:OSPP", value: "FIPS:OSPP"}

  - id: passwd_permissions
    stig_id: V-257820
    title: Verify /etc/passwd Permissions
    severity: medium
    category: Configuration Management
    disruption: low
    check_text: Verify /etc/passwd has permissions 0644 or more restrictive.
    fix_text: Set permissions on /etc/passwd to 0644.
    check:
      category: files
      type: file_permissions
      params:
        path: /etc/passwd
        max_mode: "0644"

  - id: shadow_permissions
    stig_id: V-257821
    title: Verify /etc/shadow Permissions
    severity: medium
    category: Configuration Management
    disruption: low
    check_text: Verify /etc/shadow has permissions 0000 or more restrictive.
    fix_text: Set permissions on /etc/shadow to 0000.
    check:
      category: files
      type: file_permissions
      params:
        path: /etc/shadow
        max_mode: "0000"

  - id: package_telnet_not_installed
    stig_id: V-257835
    title: Remove telnet Package
    severity: high
    category: Configuration Management
    disruption: low
    check_text: Verify telnet is not installed.
    fix_text: Remove telnet with dnf remove telnet.
    check:
      category: packages
      type: package_not_installed
      params:
        name: telnet
