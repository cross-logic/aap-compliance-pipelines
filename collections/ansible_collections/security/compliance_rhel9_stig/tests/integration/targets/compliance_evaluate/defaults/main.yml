---
# Default variables for compliance_evaluate integration test

test_host: "integration-test-host"
test_profile: "stig"

# Mock compliance facts for evaluation
test_facts:
  packages:
    openssl:
      version: "3.0.7"
      release: "18.el9"
    bash:
      version: "5.1.8"
      release: "6.el9"
  services:
    sshd:
      state: "enabled"
    firewalld:
      state: "enabled"
    telnet:
      state: "disabled"
  sysctl:
    net.ipv4.ip_forward: "0"
    kernel.randomize_va_space: "2"
  ssh_config:
    permitrootlogin: "no"
    clientaliveinterval: "600"
  files:
    /etc/passwd:
      exists: true
      mode: "0644"
      uid: 0
      gid: 0
      content: "root:x:0:0:root:/root:/bin/bash\n"
    /etc/shadow:
      exists: true
      mode: "0000"
      uid: 0
      gid: 0
  crypto_policy:
    current: "FIPS"
  selinux:
    mode: "Enforcing"
    config:
      SELINUX: "enforcing"
  grub:
    password_set: true

# Test rules covering multiple check types
test_rules:
  - id: test_ssh_root_login
    stig_id: V-257846
    title: Disable SSH Root Login
    severity: high
    check:
      category: ssh_config
      type: ssh_config
      params:
        key: permitrootlogin
        value: "no"

  - id: test_openssl_installed
    stig_id: V-100001
    title: OpenSSL must be installed
    severity: medium
    check:
      category: packages
      type: package_installed
      params:
        name: openssl

  - id: test_telnet_not_installed
    stig_id: V-100002
    title: Telnet must not be installed
    severity: high
    check:
      category: packages
      type: package_not_installed
      params:
        name: telnet-server

  - id: test_sshd_enabled
    stig_id: V-100003
    title: SSH service must be enabled
    severity: high
    check:
      category: services
      type: service_enabled
      params:
        name: sshd

  - id: test_ip_forward_disabled
    stig_id: V-100004
    title: IP forwarding must be disabled
    severity: medium
    check:
      category: sysctl
      type: sysctl_value
      params:
        key: net.ipv4.ip_forward
        value: "0"

  - id: test_fips_mode
    stig_id: V-257777
    title: FIPS mode must be enabled
    severity: high
    check:
      category: crypto_policy
      type: crypto_policy
      params:
        policy: FIPS

  - id: test_selinux
    stig_id: V-100005
    title: SELinux must be enforcing
    severity: high
    check:
      category: selinux
      type: selinux_enforcing
      params: {}

  - id: test_grub_password
    stig_id: V-100006
    title: GRUB password must be set
    severity: high
    check:
      category: grub
      type: grub_password
      params: {}

  - id: test_passwd_permissions
    stig_id: V-100007
    title: /etc/passwd permissions
    severity: medium
    check:
      category: files
      type: file_permissions
      params:
        path: /etc/passwd
        max_mode: "0644"
