---
# Integration tests for compliance_evaluate module
# Runs on localhost with mock facts -- does not require a RHEL target.

- name: Evaluate mock facts against test rules
  security.compliance_rhel9_stig.compliance_evaluate:
    facts: "{{ test_facts }}"
    rules: "{{ test_rules }}"
    host: "{{ test_host }}"
    profile: "{{ test_profile }}"
  register: evaluation

- name: Assert evaluation completed successfully
  ansible.builtin.assert:
    that:
      - evaluation is not changed
      - evaluation.findings | length == test_rules | length
      - evaluation.summary.total == test_rules | length
      - evaluation.host == test_host
      - evaluation.profile == test_profile
    fail_msg: "Evaluation did not complete with expected structure"

- name: Assert all test rules passed
  ansible.builtin.assert:
    that:
      - evaluation.summary.pass == test_rules | length
      - evaluation.summary.fail == 0
      - evaluation.summary.error == 0
    fail_msg: >
      Expected all rules to pass with the mock facts.
      Summary: {{ evaluation.summary }}

- name: Assert each finding has required metadata fields
  ansible.builtin.assert:
    that:
      - item.rule_id is defined
      - item.status is defined
      - item.severity is defined
      - item.evidence is defined
      - item.host == test_host
    fail_msg: "Finding {{ item.rule_id }} is missing required metadata"
  loop: "{{ evaluation.findings }}"
  loop_control:
    label: "{{ item.rule_id }}"

- name: Test evaluation with a deliberately failing rule
  security.compliance_rhel9_stig.compliance_evaluate:
    facts: "{{ test_facts }}"
    rules:
      - id: test_should_fail
        stig_id: V-999999
        title: Nonexistent package must be installed
        severity: high
        check:
          category: packages
          type: package_installed
          params:
            name: this_package_does_not_exist
    host: "{{ test_host }}"
    profile: "{{ test_profile }}"
  register: fail_eval

- name: Assert the failing rule produced a fail finding
  ansible.builtin.assert:
    that:
      - fail_eval.summary.fail == 1
      - fail_eval.findings[0].status == 'fail'
    fail_msg: "Expected rule to fail but got: {{ fail_eval.findings[0].status }}"

- name: Test evaluation with unknown check type
  security.compliance_rhel9_stig.compliance_evaluate:
    facts: "{{ test_facts }}"
    rules:
      - id: test_unknown_check
        title: Unknown check
        severity: low
        check:
          category: packages
          type: unknown_check_type_xyz
          params: {}
    host: "{{ test_host }}"
  register: error_eval

- name: Assert unknown check type returns error
  ansible.builtin.assert:
    that:
      - error_eval.summary.error == 1
      - error_eval.findings[0].status == 'error'
    fail_msg: "Expected error status for unknown check type"

- name: Test evaluation with empty rules list
  security.compliance_rhel9_stig.compliance_evaluate:
    facts: "{{ test_facts }}"
    rules: []
    host: "{{ test_host }}"
  register: empty_eval

- name: Assert empty rules produces empty results
  ansible.builtin.assert:
    that:
      - empty_eval.findings | length == 0
      - empty_eval.summary.total == 0
    fail_msg: "Expected empty results for empty rules"

- name: Test check mode
  security.compliance_rhel9_stig.compliance_evaluate:
    facts: "{{ test_facts }}"
    rules: "{{ test_rules }}"
    host: "{{ test_host }}"
  check_mode: true
  register: check_mode_eval

- name: Assert check mode still evaluates
  ansible.builtin.assert:
    that:
      - check_mode_eval is not changed
      - check_mode_eval.findings | length == test_rules | length
    fail_msg: "Check mode should still produce findings"
