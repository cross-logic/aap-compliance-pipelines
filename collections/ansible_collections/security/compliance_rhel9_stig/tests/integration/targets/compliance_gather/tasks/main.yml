---
# Integration tests for compliance_gather module
# Requires a RHEL 9 target host -- skip on other platforms.

- name: Check if running on RHEL 9
  ansible.builtin.command: cat /etc/redhat-release
  register: redhat_release
  failed_when: false
  changed_when: false

- name: Skip if not RHEL 9
  ansible.builtin.meta: end_play
  when: >
    redhat_release.rc != 0 or
    'Red Hat Enterprise Linux' not in (redhat_release.stdout | default('')) or
    'release 9' not in (redhat_release.stdout | default(''))

- name: Gather all compliance facts
  security.compliance_rhel9_stig.compliance_gather:
  register: gathered

- name: Assert gather returned expected structure
  ansible.builtin.assert:
    that:
      - gathered is not changed
      - gathered.compliance_facts is defined
      - gathered.categories_gathered | length > 0
      - gathered.errors | length == 0
    fail_msg: "compliance_gather did not return expected structure"

- name: Assert packages were gathered
  ansible.builtin.assert:
    that:
      - gathered.compliance_facts.packages is defined
      - gathered.compliance_facts.packages | length > 0
    fail_msg: "No packages were gathered"

- name: Assert services were gathered
  ansible.builtin.assert:
    that:
      - gathered.compliance_facts.services is defined
      - gathered.compliance_facts.services | length > 0
    fail_msg: "No services were gathered"

- name: Gather specific categories
  security.compliance_rhel9_stig.compliance_gather:
    categories:
      - packages
      - ssh_config
  register: partial_gather

- name: Assert only requested categories were gathered
  ansible.builtin.assert:
    that:
      - partial_gather.categories_gathered | sort == ['packages', 'ssh_config'] | sort
    fail_msg: "Expected only packages and ssh_config categories"
