---
- name: "Compliance: Gather facts from targets"
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: false

  tasks:
    - name: Gather compliance-relevant facts
      security.compliance_rhel9_stig.compliance_gather:
        categories: "{{ gather_categories | default(['all']) }}"
      register: compliance_data

    - name: Store compliance facts as host artifact
      ansible.builtin.set_fact:
        compliance_facts: "{{ compliance_data.compliance_facts }}"
        cacheable: true
