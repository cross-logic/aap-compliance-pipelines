---
# Compliance: Apply CaC STIG remediation
#
# This playbook imports the ComplianceAsCode (CaC) remediation playbook
# that ships with the scap-security-guide RPM inside the Execution
# Environment. It replaces the previous hand-written task list.
#
# How selective remediation works in Controller:
#   --tags:       comma-separated rule IDs from the Remediation Profile Builder
#   --extra-vars: parameter overrides (e.g., var_accounts_tmout: 900)
#   --limit:      target hosts from the remediation scope selection
#
# The CaC playbook is maintained by Red Hat as part of scap-security-guide.
# DISA releases quarterly STIG updates -> Red Hat updates the RPM -> rebuild EE.
#
# Default variables defined in the CaC playbook can be overridden via
# --extra-vars from the Remediation Profile Builder UI, for example:
#   var_accounts_tmout: 600
#   var_system_crypto_policy: "FIPS:STIG"
#   var_sshd_set_keepalive: 600
#
- name: "Compliance: Apply CaC STIG remediation"
  ansible.builtin.import_playbook: /usr/share/scap-security-guide/ansible/rhel9-playbook-stig.yml
