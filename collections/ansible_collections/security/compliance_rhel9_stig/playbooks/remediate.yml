---
# Compliance: Apply CaC STIG remediation
#
# This playbook imports the ComplianceAsCode (CaC) remediation playbook
# from the scap-security-guide RPM inside the Execution Environment.
#
# Scoping:
#   The compliance dashboard launches this JT directly (not through the
#   workflow) with native AAP job_tags to scope remediation to selected
#   rules. The CaC playbook's tasks are tagged per rule ID, so AAP's
#   built-in --tags filtering applies automatically.
#
#   No wrapper logic is needed — the JT has ask_tags_on_launch: true,
#   and the Controller passes --tags at the CLI level.
#
# Parameter overrides:
#   CaC variables (e.g., var_accounts_tmout: 900) are passed as
#   extra_vars through the JT's ask_variables_on_launch setting.
#
# Content lifecycle:
#   The CaC playbook is maintained by Red Hat as part of scap-security-guide.
#   DISA quarterly STIG updates → Red Hat RPM update → rebuild EE → new content.

- name: "Compliance: Apply CaC STIG remediation"
  ansible.builtin.import_playbook: /usr/share/scap-security-guide/ansible/rhel9-playbook-stig.yml
