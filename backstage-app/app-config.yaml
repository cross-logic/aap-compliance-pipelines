app:
  title: Ansible self-service automation portal
  baseUrl: http://localhost:3000
  branding:
    theme:
      light:
        variant: rhdh
        mode: light
        palette:
          primary:
            main: '#0066CC'
          navigation:
            background: '#212427'
            indicator: '#0066CC'
            color: '#ffffff'
            selectedColor: '#ffffff'
            navItem:
              hoverBackground: '#2c2f33'
          rhdh:
            general:
              sidebarBackgroundColor: '#212427'
              appBarBackgroundColor: '#151515'
              appBarForegroundColor: '#ffffff'

organization:
  name: AAP Compliance Prototype

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: './compliance.sqlite'
  auth:
    keys:
      - secret: ${BACKEND_SECRET}

# Compliance plugin settings
compliance:
  dataSource: live

# AAP Connection — configure via .env (see .env.example)
ansible:
  rhaap:
    baseUrl: ${AAP_HOST}
    checkSSL: false
    token: ${AAP_API_TOKEN}

auth:
  signingKey: ${AUTH_SIGNING_KEY}
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true

# GitHub integration (optional)
integrations:
  github:
    - host: github.com
      token: ${GITHUB_INTEGRATION_TOKEN}
