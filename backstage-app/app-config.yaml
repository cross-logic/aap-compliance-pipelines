app:
  title: Ansible self-service automation portal
  baseUrl: http://localhost:3000
  branding:
    theme:
      light:
        variant: rhdh
        mode: light
        palette:
          primary:
            main: '#0066CC'
          navigation:
            background: '#212427'
            indicator: '#0066CC'
            color: '#ffffff'
            selectedColor: '#ffffff'
            navItem:
              hoverBackground: '#2c2f33'
          rhdh:
            general:
              sidebarBackgroundColor: '#212427'
              appBarBackgroundColor: '#151515'
              appBarForegroundColor: '#ffffff'

organization:
  name: AAP Compliance Prototype

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'

# AAP Connection — default for local dev
ansible:
  rhaap:
    baseUrl: https://aap-aap-operator.apps.192.168.128.128.nip.io
    checkSSL: false
