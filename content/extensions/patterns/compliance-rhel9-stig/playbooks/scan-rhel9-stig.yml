---
- name: Compliance Scan — RHEL 9 DISA STIG V2R8
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    compliance_profile: "{{ profile | default('xccdf_org.ssgproject.content_profile_stig') }}"
    ssg_datastream: /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml
    report_dir: /tmp/compliance-reports
    report_format: "{{ output_format | default('json') }}"

  tasks:
    - name: Ensure OpenSCAP scanner is installed
      ansible.builtin.dnf:
        name:
          - openscap-scanner
          - openscap-utils
          - scap-security-guide
        state: present

    - name: Create report directory
      ansible.builtin.file:
        path: "{{ report_dir }}"
        state: directory
        mode: '0755'

    - name: Run OpenSCAP evaluation
      ansible.builtin.command:
        cmd: >
          oscap xccdf eval
          --profile {{ compliance_profile }}
          --results {{ report_dir }}/results-{{ inventory_hostname }}.xml
          --report {{ report_dir }}/report-{{ inventory_hostname }}.html
          {{ ssg_datastream }}
      register: scan_result
      failed_when: false
      changed_when: false

    - name: Parse scan results to JSON
      ansible.builtin.command:
        cmd: >
          oscap xccdf generate report
          --output {{ report_dir }}/report-{{ inventory_hostname }}.html
          {{ report_dir }}/results-{{ inventory_hostname }}.xml
      failed_when: false
      changed_when: false

    - name: Report scan summary
      ansible.builtin.debug:
        msg: >
          Scan complete for {{ inventory_hostname }}.
          Exit code: {{ scan_result.rc }}
          (0=all pass, 1=error, 2=some fail).
          Results: {{ report_dir }}/results-{{ inventory_hostname }}.xml
