---
- name: Compliance Remediation — RHEL 9 DISA STIG V2R8
  hosts: "{{ target_hosts | default('all') }}"
  become: true
  gather_facts: true

  vars:
    compliance_profile: "{{ profile | default('xccdf_org.ssgproject.content_profile_stig') }}"
    ssg_datastream: /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml
    remediation_selections: "{{ selected_rules | default([]) }}"
    remediation_parameters: "{{ rule_parameters | default({}) }}"

  tasks:
    - name: Generate remediation playbook from scan results
      ansible.builtin.command:
        cmd: >
          oscap xccdf generate fix
          --fix-type ansible
          --profile {{ compliance_profile }}
          --output /tmp/remediation-playbook.yml
          {{ ssg_datastream }}
      changed_when: false
      when: remediation_selections | length == 0

    - name: Apply full remediation (all rules)
      ansible.builtin.include_tasks: /tmp/remediation-playbook.yml
      when: remediation_selections | length == 0

    - name: Apply selected remediations
      when: remediation_selections | length > 0
      block:
        - name: Apply selected STIG remediations
          ansible.builtin.debug:
            msg: >
              Applying {{ remediation_selections | length }} selected rules
              with custom parameters: {{ remediation_parameters | to_nice_json }}
          # In production: iterate over selected rules and apply each
          # using the ComplianceAsCode per-rule playbooks with custom vars
