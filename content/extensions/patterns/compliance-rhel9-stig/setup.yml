---
- name: Seed compliance pattern resources into AAP
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    controller_host: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://aap-aap-operator.apps.192.168.128.128.nip.io', true) }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') | default('Bq6wUTkn1hA5JQQKzpKBtGigqO6SWE81', true) }}"
    controller_validate_certs: false
    compliance_org: compliance-prototype

  collections:
    - infra.controller_configuration

  tasks:
    - name: Include AAP resource definitions
      ansible.builtin.include_vars:
        dir: aap_config
        extensions:
          - yml
          - yaml
