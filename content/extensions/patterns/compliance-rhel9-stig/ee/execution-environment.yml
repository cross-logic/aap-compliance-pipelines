---
version: 3

build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: '--pre'

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-26/ee-minimal-rhel9:latest

dependencies:
  galaxy:
    collections:
      - name: ansible.posix
      - name: community.general
      - name: redhat.rhel_system_roles
  python:
    - lxml
    - openscap-daemon
  system:
    - openscap-scanner
    - openscap-utils
    - scap-security-guide

additional_build_steps:
  append_final:
    - RUN scap-security-guide --version || true
