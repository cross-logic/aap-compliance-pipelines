---
# Execution Environment Profile: DISA STIG for RHEL 9
# Used by the AAP EE Builder to construct a compliance-ready EE.
#
# The scap-security-guide RPM includes:
#   - SCAP data streams for OpenSCAP scanning (/usr/share/xml/scap/ssg/content/)
#   - Pre-rendered Ansible remediation playbooks (/usr/share/scap-security-guide/ansible/)
#   - XCCDF/OVAL content for 300+ STIG rules
#
# This RPM is maintained by Red Hat as part of RHEL.
# DISA quarterly updates -> Red Hat RPM update -> rebuild EE -> new content.
#
# Build:
#   cd collections/ansible_collections/security/compliance_rhel9_stig
#   ansible-builder build -f meta/ee_profile.yml -t compliance-stig-rhel9:latest -v3
#
# Or use the build script:
#   ./scripts/build-ee.sh

version: 3

build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: '--pre'

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-26/ee-minimal-rhel9:latest

dependencies:
  galaxy:
    collections:
      - name: ansible.posix
      - name: redhat.rhel_system_roles
  python: []
  system:
    - scap-security-guide
    - openscap-scanner
    - openscap-utils

additional_build_steps:
  prepend_galaxy:
    # Install the compliance collection from the local source
    # (not published to Galaxy/Hub yet)
    - COPY _build/collections/ /usr/share/ansible/collections/
  append_final:
    - RUN echo "=== Compliance EE Build Info ==="
    - RUN echo "scap-security-guide: $(rpm -q scap-security-guide)"
    - RUN echo "openscap-scanner: $(rpm -q openscap-scanner)"
    - RUN ls /usr/share/scap-security-guide/ansible/rhel9-playbook-stig.yml && echo "CaC remediation playbook: present" || echo "CaC remediation playbook: MISSING"
    - RUN ls /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml && echo "SCAP data stream: present" || echo "SCAP data stream: MISSING"
