---
- name: "Compliance: Evaluate facts against STIG rules (runs on localhost)"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    rules_file: "{{ playbook_dir }}/../rules/stig_rhel9_v2r8.yml"
    profile: stig

  tasks:
    - name: Load STIG rules
      ansible.builtin.include_vars:
        file: "{{ rules_file }}"
        name: stig_profile

    - name: Get list of inventoried hosts from fact cache
      ansible.builtin.set_fact:
        target_hosts: "{{ groups[target_group | default('all')] | default([]) }}"

    - name: Evaluate compliance for each host
      security.compliance_rhel9_stig.compliance_evaluate:
        facts: "{{ hostvars[item]['compliance_facts'] | default({}) }}"
        rules: "{{ stig_profile.rules }}"
        profile: "{{ profile }}"
        host: "{{ item }}"
      loop: "{{ target_hosts }}"
      register: evaluation_results

    - name: Build consolidated findings report
      ansible.builtin.set_fact:
        compliance_report:
          profile: "{{ stig_profile.profile }}"
          timestamp: "{{ ansible_date_time.iso8601 | default(lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ')) }}"
          hosts_evaluated: "{{ target_hosts | length }}"
          findings: "{{ evaluation_results.results | map(attribute='findings') | list | flatten }}"
          summary:
            total: "{{ evaluation_results.results | map(attribute='summary.total') | map('int') | sum }}"
            pass: "{{ evaluation_results.results | map(attribute='summary.pass') | map('int') | sum }}"
            fail: "{{ evaluation_results.results | map(attribute='summary.fail') | map('int') | sum }}"
            error: "{{ evaluation_results.results | map(attribute='summary.error') | map('int') | sum }}"

    - name: Write findings to artifact file
      ansible.builtin.copy:
        content: "{{ compliance_report | to_nice_json }}"
        dest: /tmp/compliance_report.json
        mode: '0644'

    - name: Display summary
      ansible.builtin.debug:
        msg: >
          Compliance evaluation complete.
          Hosts: {{ compliance_report.hosts_evaluated }}.
          Total rules: {{ compliance_report.summary.total }}.
          Pass: {{ compliance_report.summary.pass }}.
          Fail: {{ compliance_report.summary.fail }}.
          Error: {{ compliance_report.summary.error }}.
