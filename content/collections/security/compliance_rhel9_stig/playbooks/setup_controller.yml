---
# Setup Controller resources for the Compliance Pipeline prototype.
#
# This playbook uses infra.aap_configuration roles to provision
# all required Controller resources in a single run.  It is compatible
# with AAP 2.5, 2.6, and 2.7 (uses the Gateway API variable conventions
# introduced in infra.aap_configuration 2.x).
#
# Usage:
#   ansible-playbook setup_controller.yml \
#     -e controller_host=https://aap.example.com \
#     -e controller_username=admin \
#     -e controller_password='<changeme>' \
#     -e target_host=192.168.128.128 \
#     -e target_ssh_user=root \
#     -e target_ssh_password='<changeme>'
#
# All six variables above are required.
#
# Prerequisites:
#   - infra.aap_configuration collection (>= 2.5)
#   - ansible.controller collection (>= 4.6, included in AAP EE)
#   - ansible.platform collection (>= 2.5, included in AAP EE)
#   - Network access to the AAP Gateway API

- name: "Compliance Pipeline: Provision Controller resources"
  hosts: localhost
  connection: local
  gather_facts: false

  collections:
    - infra.aap_configuration

  vars:
    # ── User-supplied variables (override via --extra-vars) ──────────
    controller_host: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://aap.example.com', true) }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') | default('', true) }}"
    target_host: "{{ lookup('env', 'TARGET_HOST') | default('192.168.128.128', true) }}"
    target_ssh_user: "{{ lookup('env', 'TARGET_SSH_USER') | default('root', true) }}"
    target_ssh_password: "{{ lookup('env', 'TARGET_SSH_PASSWORD') | default('', true) }}"

    # ── infra.aap_configuration authentication ──────────────────────
    # These are the canonical variable names expected by all roles in
    # infra.aap_configuration 2.x (AAP 2.5+).
    aap_hostname: "{{ controller_host }}"
    aap_username: "{{ controller_username }}"
    aap_password: "{{ controller_password }}"
    aap_validate_certs: false

    # ── Resource naming ─────────────────────────────────────────────
    compliance_org: compliance-prototype
    compliance_inventory: compliance-rhel9-inventory
    compliance_credential: compliance-lab-ssh
    compliance_project: compliance-cartridge
    compliance_scm_url: "https://github.com/cross-logic/aap-compliance-pipelines.git"
    compliance_scm_branch: main

    # Playbook paths (relative to project root)
    playbook_gather_facts: "collections/ansible_collections/security/compliance_rhel9_stig/playbooks/gather_facts.yml"
    playbook_evaluate: "collections/ansible_collections/security/compliance_rhel9_stig/playbooks/evaluate.yml"
    playbook_remediate: "collections/ansible_collections/security/compliance_rhel9_stig/playbooks/remediate.yml"

    # ── Organization (gateway_organizations for AAP 2.5+) ───────────
    aap_organizations:
      - name: "{{ compliance_org }}"
        description: "Compliance pipeline prototype organization"
        state: present

    # ── Machine Credential ──────────────────────────────────────────
    controller_credentials:
      - name: "{{ compliance_credential }}"
        organization: "{{ compliance_org }}"
        credential_type: Machine
        inputs:
          username: "{{ target_ssh_user }}"
          password: "{{ target_ssh_password }}"
          become_method: sudo
        state: present

    # ── Project ─────────────────────────────────────────────────────
    controller_projects:
      - name: "{{ compliance_project }}"
        organization: "{{ compliance_org }}"
        scm_type: git
        scm_url: "{{ compliance_scm_url }}"
        scm_branch: "{{ compliance_scm_branch }}"
        scm_update_on_launch: true
        scm_clean: true
        description: "Compliance pipeline collection and playbooks"
        state: present
        wait: true

    # ── Inventory ───────────────────────────────────────────────────
    controller_inventories:
      - name: "{{ compliance_inventory }}"
        organization: "{{ compliance_org }}"
        description: "RHEL 9 hosts for compliance scanning and remediation"
        state: present

    # ── Host ────────────────────────────────────────────────────────
    controller_hosts:
      - name: "{{ target_host }}"
        inventory: "{{ compliance_inventory }}"
        variables:
          ansible_host: "{{ target_host }}"
          ansible_connection: ssh
        state: present

    # ── Job Templates ───────────────────────────────────────────────
    controller_templates:
      - name: compliance-gather-facts
        organization: "{{ compliance_org }}"
        inventory: "{{ compliance_inventory }}"
        project: "{{ compliance_project }}"
        playbook: "{{ playbook_gather_facts }}"
        credentials:
          - "{{ compliance_credential }}"
        become_enabled: true
        use_fact_cache: true
        description: "Gather compliance-relevant facts from target hosts"
        state: present

      - name: compliance-evaluate
        organization: "{{ compliance_org }}"
        inventory: "{{ compliance_inventory }}"
        project: "{{ compliance_project }}"
        playbook: "{{ playbook_evaluate }}"
        use_fact_cache: true
        description: "Evaluate gathered facts against STIG rules"
        state: present

      - name: compliance-remediate
        organization: "{{ compliance_org }}"
        inventory: "{{ compliance_inventory }}"
        project: "{{ compliance_project }}"
        playbook: "{{ playbook_remediate }}"
        credentials:
          - "{{ compliance_credential }}"
        become_enabled: true
        description: "Apply CaC STIG remediation to target hosts"
        state: present

    # ── Workflow Job Template ───────────────────────────────────────
    controller_workflows:
      - name: compliance-pipeline-rhel9-stig
        organization: "{{ compliance_org }}"
        description: "RHEL 9 STIG compliance pipeline: Gather Facts -> Evaluate -> Remediate"
        state: present
        simplified_workflow_nodes:
          - identifier: gather-facts
            unified_job_template:
              name: compliance-gather-facts
              type: job_template
              organization:
                name: "{{ compliance_org }}"
            success_nodes:
              - evaluate

          - identifier: evaluate
            unified_job_template:
              name: compliance-evaluate
              type: job_template
              organization:
                name: "{{ compliance_org }}"
            success_nodes:
              - remediate

          - identifier: remediate
            unified_job_template:
              name: compliance-remediate
              type: job_template
              organization:
                name: "{{ compliance_org }}"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - controller_host | length > 0
          - controller_password | length > 0
          - target_host | length > 0
          - target_ssh_password | length > 0
        fail_msg: >-
          Missing required variables. Provide all of:
          controller_host, controller_password, target_host, target_ssh_password.
          Example:
            ansible-playbook setup_controller.yml
              -e controller_host=https://aap.example.com
              -e controller_username=admin
              -e controller_password=changeme
              -e target_host=192.168.128.128
              -e target_ssh_user=root
              -e target_ssh_password=changeme

  tasks:
    # ── Step 1: Create organization ────────────────────────────────
    # Use gateway_organizations for AAP 2.5+ (platform-level resource).
    # Falls back to controller_organizations if gateway role is
    # unavailable (e.g., older collection version or AWX-only).
    - name: Create organization (AAP 2.5+ via Gateway)
      ansible.builtin.include_role:
        name: infra.aap_configuration.gateway_organizations
      rescue:
        - name: Create organization (fallback to Controller role)
          ansible.builtin.include_role:
            name: infra.aap_configuration.controller_organizations
          vars:
            controller_organizations: "{{ aap_organizations }}"

    # ── Step 2: Create machine credential ──────────────────────────
    - name: Configure machine credential
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_credentials

    # ── Step 3: Create project and wait for sync ───────────────────
    - name: Configure project
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_projects

    # ── Step 4: Create inventory ───────────────────────────────────
    - name: Configure inventory
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_inventories

    # ── Step 5: Add host to inventory ──────────────────────────────
    - name: Configure host
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_hosts

    # ── Step 6: Create job templates ───────────────────────────────
    - name: Configure job templates
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_job_templates

    # ── Step 7: Create workflow job template ────────────────────────
    - name: Configure workflow job template
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_workflow_job_templates

    # ── Summary ────────────────────────────────────────────────────
    - name: Setup complete
      ansible.builtin.debug:
        msg: |
          Compliance pipeline setup complete!

          Organization:  {{ compliance_org }}
          Inventory:     {{ compliance_inventory }}
          Host:          {{ target_host }}
          Credential:    {{ compliance_credential }}
          Project:       {{ compliance_project }}

          Job Templates:
            - compliance-gather-facts   (become: yes, fact cache: yes)
            - compliance-evaluate       (fact cache: yes)
            - compliance-remediate      (become: yes)

          Workflow:
            - compliance-pipeline-rhel9-stig
              Gather Facts -> Evaluate -> Remediate
...
