name: Build Compliance EE

on:
  push:
    branches: [main]
    paths:
      - 'collections/ansible_collections/security/compliance_rhel9_stig/**'
      - '.github/workflows/build-ee.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/compliance-stig-rhel9
  COLLECTION_DIR: collections/ansible_collections/security/compliance_rhel9_stig

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-builder
        run: pip install ansible-builder

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to registry.redhat.io
        uses: docker/login-action@v3
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REDHAT_REGISTRY_USER }}
          password: ${{ secrets.REDHAT_REGISTRY_TOKEN }}

      - name: Build EE
        run: |
          BUILD_DIR=$(mktemp -d)
          cp $COLLECTION_DIR/meta/ee_profile.yml $BUILD_DIR/execution-environment.yml
          cd $BUILD_DIR
          ansible-builder create \
            -f execution-environment.yml \
            -v 3
          mkdir -p context/_build/collections/ansible_collections/security
          cp -r $GITHUB_WORKSPACE/$COLLECTION_DIR context/_build/collections/ansible_collections/security/compliance_rhel9_stig
          ls context/  # debug: show what ansible-builder generated
          docker build -t $IMAGE_NAME:latest context

      - name: Tag with SHA
        run: docker tag $IMAGE_NAME:latest $IMAGE_NAME:${{ github.sha }}

      - name: Push to GHCR
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Verify scap-security-guide
        run: |
          docker run --rm $IMAGE_NAME:latest \
            rpm -q scap-security-guide openscap-scanner openscap-utils
          docker run --rm $IMAGE_NAME:latest \
            ls /usr/share/scap-security-guide/ansible/rhel9-playbook-stig.yml
          docker run --rm $IMAGE_NAME:latest \
            ansible-galaxy collection list security.compliance_rhel9_stig
